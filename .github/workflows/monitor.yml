name: Monitor Flight Points Promotions

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:
    inputs:
      test_email:
        description: "Send a test email to verify credentials (yes/no)"
        default: "no"

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run monitor
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_RECIPIENT: ${{ secrets.ALERT_RECIPIENT }}
        run: |
          if [ "${{ github.event.inputs.test_email }}" = "yes" ]; then
            python main.py --test-email
          else
            python main.py
          fi

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update promotion state [skip ci]"
          git push
